<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Book of Mormon Scripture Top 10 List</title>
    <meta name="description" content="Application that lets the user enter their favorite scripture and displays a list of them">
    <meta name="author" content="Le'olani Enos">

    <link rel="stylesheet" href="styles/bom.css">
    <script src="scripts/bom.js" defer></script>
</head>
<body>
    <header>
        <h1>📖 Book of Mormon - Top 10</h1>
    </header>
    
    <main>
	    <label for="favchap">Enter Book and Chapter: </label>
	    <input type="text" id="favchap" placeholder="Alma 5">
	    <button type="submit">Add Chapter</button>
	    <ul id="list"></ul>
    </main>
</body>
</html>
